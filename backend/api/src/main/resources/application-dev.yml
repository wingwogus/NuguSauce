spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000
jwt:
  secret: ${DEV_JWT_SECRET}

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  database: ${REDIS_DB:0}

app:
  mail:
    from-name: ${DEV_MAIL_FROM_NAME:NuguSauce}
  url: ${APP_URL:http://localhost:8081}

auth:
  kakao:
    oidc:
      issuer: https://kauth.kakao.com
      audience: ${KAKAO_NATIVE_APP_KEY}
      discovery-uri: https://kauth.kakao.com/.well-known/openid-configuration
      user-info-uri: https://kapi.kakao.com/v1/oidc/userinfo
      allowed-clock-skew-seconds: 60
      nonce-replay-ttl-seconds: 600
  apple:
    oidc:
      issuer: https://appleid.apple.com
      audience: ${APPLE_CLIENT_ID}
      jwks-uri: https://appleid.apple.com/auth/keys
      allowed-clock-skew-seconds: 60

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dyzg8xb4n}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
