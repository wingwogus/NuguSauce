spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:local@example.test}
    password: ${MAIL_PASSWORD:local-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000
# Base64 인코딩된 dummy key. (실서버에서는 secret을 프로필마다 override)
jwt:
  secret: t2oRk29vBQZWS8GEt4xr8AJznlPK0ipBKUwdyqe10SOGZB26vVBMjzqualdJsjcOY1wX9DOqJC9V1DFl58F0tQ==

redis:
  host: localhost
  port: 6379
  database: 0

app:
  mail:
    from-name: ${MAIL_FROM_NAME:NuguSauce}
  url: ${APP_URL:http://localhost:8081}

auth:
  kakao:
    oidc:
      issuer: https://kauth.kakao.com
      audience: ${KAKAO_NATIVE_APP_KEY:test-kakao-native-app-key}
      discovery-uri: https://kauth.kakao.com/.well-known/openid-configuration
      user-info-uri: https://kapi.kakao.com/v1/oidc/userinfo
      allowed-clock-skew-seconds: 60
      nonce-replay-ttl-seconds: 600
  apple:
    oidc:
      issuer: https://appleid.apple.com
      audience: ${APPLE_CLIENT_ID:com.nugusauce.ios}
      jwks-uri: https://appleid.apple.com/auth/keys
      allowed-clock-skew-seconds: 60
    client:
      team-id: ${APPLE_TEAM_ID:}
      key-id: ${APPLE_KEY_ID:}
      private-key: ${APPLE_PRIVATE_KEY:}
    refresh-token-encryption-key: ${APPLE_REFRESH_TOKEN_ENCRYPTION_KEY:${jwt.secret}}

nugusauce:
  seed:
    enabled: ${NUGUSAUCE_SEED_ENABLED:true}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dyzg8xb4n}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
